; ============================================================
; TDnet開示監視スクリプト 設定ファイル
; メモ帳で編集して上書き保存してください(文字コードはUTF-8のまま)
; 行頭が ; の行はコメント(無視されます)
; ============================================================

[monitor]
; 巡回間隔(秒)。300 = 5分。無料APIへの配慮のため180未満にしないでください
interval_sec = 300
; 1回の巡回で取得する開示件数(決算集中日対策)
fetch_limit = 500
; 監視時間帯(この時間外は巡回を休みます)
active_start = 07:00
active_end = 20:00
; 土日も監視するか (true / false)
weekend = false

[notify]
; Windows通知を出すか
windows_toast = true
; メール通知を出すか
email = true
; true: 監視銘柄の全開示を通知 / false: 好材料・悪材料キーワードに該当した時だけ通知
notify_all = true

[mail]
; ※クラウド実行時はGitHubのSecretsが使われます。公開リポジトリではこの欄は必ず空のままにすること
gmail_address =
app_password =
mail_to =

[keywords]
; 悪材料と判定するキーワード(カンマ区切り。自由に追加・削除OK)
negative = 下方修正,減損,特別損失,減配,無配,業務改善,行政処分,不適切,課徴金,提訴,訴訟,火災,事故,操業停止,延期,監理,特設注意,希薄化
; 好材料と判定するキーワード
positive = 上方修正,増配,復配,自己株式の取得,株式分割,受注,大口,提携,共同開発,最高益,増額,量産
; 通知しない定型開示(毎月の事務的な開示のノイズ除け。ログには残ります)
mute = 取得状況,行使状況,自己株券買付状況,発行済株式総数
