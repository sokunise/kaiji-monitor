name: kaiji-monitor
on:
  schedule:
    # JST 平日7:00-8:59 (UTCでは日-木の22-23時)。分は混雑回避のため半端な値
    - cron: "0,1,2,16,30,31,46,59 22-23 * * 0-4"
    # JST 平日9:00-19:59 (UTCでは月-金の0-10時)
    - cron: "0,1,2,16,30,31,46,59 0-10 * * 1-5"
  workflow_dispatch: {}

concurrency:
  group: monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Run monitor
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
        run: python3 kaiji_monitor.py --once
 
- name: Save state
        run: |
          git config user.name "monitor-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "update state [skip ci]"
          git pull --rebase origin main || true
          git push || true
